apiVersion: apps/v1
kind: Deployment

metadata:
  name: mlops-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mlops-platform

  template:
    metadata:
      labels:
        app: mlops-platform

    spec:
      containers:
      - name: mlops-platform
        image: mlops-platform:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000